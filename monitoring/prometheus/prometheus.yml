global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    platform: cloudflare
    org: zeazdev

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: cloudflared-tunnels
    metrics_path: /metrics
    static_configs:
      - targets: ['cloudflared:2000']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
