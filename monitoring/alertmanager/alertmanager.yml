global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

receivers:
  - name: default
    webhook_configs:
      - url_file: /etc/alertmanager/secrets/default_webhook_url
        send_resolved: true
  - name: security
    webhook_configs:
      - url_file: /etc/alertmanager/secrets/security_webhook_url
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ['alertname', 'service']
