name: Terraform Plan

on:
  pull_request:
    paths:
      - 'cloudflare-platform/terraform/**'
      - 'cloudflare-platform/opentofu/**'
      - 'cloudflare-platform/scripts/**'
      - '.github/workflows/terraform-plan.yml'
      - 'cloudflare-platform/Makefile'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-plan-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
        # All relative paths resolve from the repo root
        working-directory: ${{ github.workspace }}

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Debug — confirm script location before touching it ────────────────
      - name: Debug — locate load-env.sh
        run: |
          echo "=== workspace: $GITHUB_WORKSPACE"
          echo "=== searching for load-env.sh..."
          find "$GITHUB_WORKSPACE" -name "load-env.sh" 2>/dev/null \
            && echo "=== top-level layout:" \
            && ls "$GITHUB_WORKSPACE" \
            || echo "WARNING: load-env.sh not found anywhere"

      # ── 3. Static analysis ───────────────────────────────────────────────────
      - name: Validate shell scripts syntax
        run: |
          find "$GITHUB_WORKSPACE/cloudflare-platform/scripts" \
            -type f -name '*.sh' -print0 \
            | xargs -0 -r -I{} bash -n {}

      # ── 4. Preflight — fail fast with clear errors if secrets are missing ────
      - name: Preflight — verify secrets are configured
        env:
          CF_ACCOUNT_ID:    ${{ secrets.CF_ACCOUNT_ID }}
          CF_ZONE_ID:       ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN:     ${{ secrets.CF_API_TOKEN }}
          CF_DNS_TOKEN:     ${{ secrets.CF_DNS_TOKEN }}
          CF_ZT_TOKEN:      ${{ secrets.CF_ZT_TOKEN }}
          CF_WORKERS_TOKEN: ${{ secrets.CF_WORKERS_TOKEN }}
          CF_WAF_TOKEN:     ${{ secrets.CF_WAF_TOKEN }}
          CF_TUNNEL_TOKEN:  ${{ secrets.CF_TUNNEL_TOKEN }}
          CF_R2_TOKEN:      ${{ secrets.CF_R2_TOKEN }}
        run: |
          missing=0
          for var in \
            CF_ACCOUNT_ID \
            CF_ZONE_ID \
            CF_API_TOKEN \
            CF_DNS_TOKEN \
            CF_ZT_TOKEN \
            CF_WORKERS_TOKEN \
            CF_WAF_TOKEN \
            CF_TUNNEL_TOKEN \
            CF_R2_TOKEN; do
            if [[ -z "${!var:-}" ]]; then
              echo "::error::Secret not configured: $var — add it at Settings → Secrets → Actions"
              (( missing++ )) || true
            fi
          done
          (( missing == 0 )) || exit 1

      # ── 5. Load environment ──────────────────────────────────────────────────
      - name: Load environment
        env:
          CF_ACCOUNT_ID:       ${{ secrets.CF_ACCOUNT_ID }}
          CF_ZONE_ID:          ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN:        ${{ secrets.CF_API_TOKEN }}
          CF_DNS_TOKEN:        ${{ secrets.CF_DNS_TOKEN }}
          CF_ZT_TOKEN:         ${{ secrets.CF_ZT_TOKEN }}
          CF_WORKERS_TOKEN:    ${{ secrets.CF_WORKERS_TOKEN }}
          CF_WAF_TOKEN:        ${{ secrets.CF_WAF_TOKEN }}
          CF_TUNNEL_TOKEN:     ${{ secrets.CF_TUNNEL_TOKEN }}
          CF_R2_TOKEN:         ${{ secrets.CF_R2_TOKEN }}
          CF_AUDIT_TOKEN:      ${{ secrets.CF_AUDIT_TOKEN }}
          CF_AI_GATEWAY_TOKEN: ${{ secrets.CF_AI_GATEWAY_TOKEN }}
          CF_AI_GATEWAY_SLUG:  ${{ secrets.CF_AI_GATEWAY_SLUG }}
          STRICT_ENV: "true"
        run: |
          SCRIPT="$GITHUB_WORKSPACE/cloudflare-platform/scripts/cloudflare/load-env.sh"
          chmod +x "$SCRIPT"
          "$SCRIPT"

      # ── 6. Toolchain ─────────────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      # ── 7. Plan ──────────────────────────────────────────────────────────────
      - name: Run Terraform plan
        working-directory: ${{ github.workspace }}/cloudflare-platform
        env:
          ENVIRONMENT:    dev
          PRIMARY_DOMAIN: zeaz.dev
          CONFIRM_APPLY:  "no"
          # TF_VAR_* — Terraform reads these automatically as input variables
          TF_VAR_cf_api_token:                   ${{ secrets.CF_API_TOKEN }}
          TF_VAR_cf_dns_token:                   ${{ secrets.CF_DNS_TOKEN }}
          TF_VAR_cf_zone_id:                     ${{ secrets.CF_ZONE_ID }}
          TF_VAR_cf_account_id:                  ${{ secrets.CF_ACCOUNT_ID }}
          TF_VAR_cf_zt_token:                    ${{ secrets.CF_ZT_TOKEN }}
          TF_VAR_cf_workers_token:               ${{ secrets.CF_WORKERS_TOKEN }}
          TF_VAR_cf_waf_token:                   ${{ secrets.CF_WAF_TOKEN }}
          TF_VAR_cf_tunnel_token:                ${{ secrets.CF_TUNNEL_TOKEN }}
          TF_VAR_cf_r2_token:                    ${{ secrets.CF_R2_TOKEN }}
          TF_VAR_identity_provider_metadata_url: ${{ secrets.IDENTITY_PROVIDER_METADATA_URL }}
        run: make tf-plan

      # ── 8. Artifacts ─────────────────────────────────────────────────────────
      - name: Upload Terraform plan artifacts
        if: ${{ hashFiles('cloudflare-platform/terraform/**/*.tfplan', 'cloudflare-platform/terraform/**/plan-*.txt') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-artifacts
          path: |
            cloudflare-platform/terraform/**/*.tfplan
            cloudflare-platform/terraform/**/plan-*.txt
          if-no-files-found: warn
