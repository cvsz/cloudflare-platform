name: Backup Validation and DR Testing
on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * 0"
permissions: {contents: read}

jobs:
  dr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/backup.sh
      - run: pytest -q tests/test_runbooks.py
      - uses: actions/upload-artifact@v4
        with: {name: backups, path: backups/snapshots}
