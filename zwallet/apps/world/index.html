<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zWallet World Portal | Next-Gen Multi-Chain Platform</title>
    <meta name="description" content="Secure wallet, swap, card, and fiat operations with deterministic AI-enhanced UX states." />
    
    <!-- Design System Foundations -->
    <link rel="stylesheet" href="../../../ui/design-system/tokens.css" />
    <link rel="stylesheet" href="../../../ui/design-system/base.css" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="app-shell">
      <header class="topbar glass-panel">
        <div class="logo-area">
          <span class="icon">⚛️</span>
          <h1 class="text-gradient">zWallet World</h1>
        </div>
        <nav class="main-nav">
          <button class="nav-item active">Dashboard</button>
          <button class="nav-item">Infrastructure</button>
          <button class="nav-item">AI Assistant</button>
        </nav>
        <div class="user-profile">
          <span class="badge">PRO</span>
          <div class="avatar"></div>
        </div>
      </header>

      <main id="app" class="dashboard-grid"></main>

      <footer class="status-bar glass-panel">
        <div class="status-indicator">
          <span class="dot pulse success"></span>
          <span>Platform Secure</span>
        </div>
        <div class="tx-monitor">
          <span>TX Pool: <strong id="pool-count">0</strong></span>
        </div>
      </footer>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
